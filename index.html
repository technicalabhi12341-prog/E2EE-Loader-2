/* ================= PREMIUM BG ================= */

to{

/* ================= GOLD OVERLAY ================= */

content:"";    

position:fixed;    

inset:0;    

background:

/* ================= SPARKLES ================= */

.sparkles{

position:fixed;    

inset:0;    

overflow:hidden;    

pointer-events:none;    

z-index:-2;

}

.sparkles span{

position:absolute;    

width:4px;    
height:4px;    

border-radius:50%;    

background:#ffd700;    

box-shadow:    
0 0 8px #ffd700,    
0 0 18px #ffcc00,    
0 0 28px #fff2a6;    

animation:sparkle linear infinite;

}

@keyframes sparkle{

from{    
    transform:translateY(110vh) scale(.3);    
    opacity:0;    
}    

15%{

}    

to{    
    transform:translateY(-10vh) scale(1);    
    opacity:0;    
}

}

/* ================= GOLD LIGHT ================= */

.light{

position:fixed;    

width:350px;    
height:350px;    

border-radius:50%;    

background:    
radial-gradient(circle,    
rgba(255,215,0,.18),    
transparent 70%);    

pointer-events:none;    

mix-blend-mode:screen;    

z-index:-1;

}

/* ================= MAIN PANEL ================= */

.container{

backdrop-filter:blur(18px);    

background:rgba(10,8,4,.45);

padding:22px;    

border:1px solid rgba(255,215,0,.14);    

box-shadow:    
0 0 25px rgba(255,215,0,.16),    
0 0 60px rgba(255,180,0,.08),    
inset 0 0 18px rgba(255,255,255,.03);

}

@keyframes openUI{

from{    
    opacity:0;    
    transform:translateY(20px);    
}    

to{    
    opacity:1;    
    transform:translateY(0);    
}

}

/* ================= TITLE ================= */

}

filter:none;

-webkit-font-smoothing:antialiased;

}

.logo p{

font-size:12px;    

letter-spacing:2px;    

color:#ffe082;

40%{

60%{

100%{

bottom:25px;

}

85%{

bottom:25px;

}
